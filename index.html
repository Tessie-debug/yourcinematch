<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CineMatch — Personalised Movie Recommender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFB6C1;--bg2:#87CEEB;--surface:#FF85A1;--border:#FF69B4;--gold:#c94c97;--gold2:#faf1dc;--text:#121111;--muted:#121111;--white:#f52318}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Times New Roman',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.3;mix-blend-mode:overlay}
header{position:relative;padding:70px 40px 50px;text-align:center;border-bottom:1px solid var(--border);overflow:hidden}
header::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:100px;height:2px;background:var(--gold)}
.hbg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1200 0%,transparent 70%);pointer-events:none}
.logo{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,7vw,5rem);font-weight:900;letter-spacing:-2px;color:var(--white);line-height:1;position:relative}
.logo span{color:var(--gold);font-style:italic}
.tagline{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin-top:12px}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
main{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 200px)}
@media(max-width:760px){main{grid-template-columns:1fr}header{padding:40px 20px 30px}}
.form-panel{background:var(--bg2);border-right:1px solid var(--border);padding:36px 28px;position:sticky;top:0;height:100vh;overflow-y:auto}
.section-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.field{margin-bottom:22px}
label{display:block;font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);border-radius:2px;outline:none;margin-top:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 8px rgba(201,168,76,.5)}
.age-big{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;color:var(--white);margin-top:6px}
.gtoggle{display:flex;gap:7px}
.gbtn{flex:1;padding:9px 6px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.08em;cursor:pointer;transition:all .2s;text-transform:uppercase}
.gbtn:hover{border-color:var(--gold);color:var(--gold)}
.gbtn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:500}
select{width:100%;padding:9px 13px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;appearance:none;cursor:pointer;transition:border-color .2s;outline:none}
select:focus{border-color:var(--gold)}
.sw{position:relative}
.sw::after{content:'▾';position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--gold);pointer-events:none;font-size:.75rem}
.ggrid{display:flex;flex-wrap:wrap;gap:5px}
.gchip{padding:4px 10px;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.05em;cursor:pointer;transition:all .15s;user-select:none;border-radius:2px}
.gchip:hover{border-color:var(--gold);color:var(--gold)}
.gchip.sel{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold2)}
.cta{width:100%;padding:15px;background:var(--gold);color:#000;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;letter-spacing:.05em;border:none;cursor:pointer;margin-top:6px;transition:all .2s;position:relative;overflow:hidden}
.cta:hover{background:var(--gold2)}
.cta:active{transform:scale(.98)}
.cta:disabled{opacity:.5;cursor:not-allowed}
.dstats{display:flex;flex-direction:column;gap:8px;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
.ds{display:flex;flex-direction:column;gap:2px}
.dsv{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--gold)}
.dsl{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.rp{padding:36px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;gap:14px}
.ei{font-size:3.5rem;opacity:.18}
.et{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;color:var(--muted);line-height:1.6}
.loader{display:none;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:18px}
.loader.on{display:flex}
.spin{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
.rh{margin-bottom:28px;opacity:0;transition:opacity .4s}
.rh.vis{opacity:1}
.rt{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--white)}
.rs{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);margin-top:5px;letter-spacing:.08em}
.sbar{display:flex;gap:20px;padding:14px 20px;background:var(--bg2);border:1px solid var(--border);margin-bottom:22px;flex-wrap:wrap}
.sv{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--gold)}
.sl{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.cards{display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);padding:22px;display:grid;grid-template-columns:46px 1fr auto;gap:18px;align-items:start;opacity:0;transform:translateY(18px);transition:opacity .4s,transform .4s,border-color .2s,box-shadow .2s}
.card.vis{opacity:1;transform:translateY(0)}
.card:hover{border-color:rgba(201,168,76,.3);box-shadow:0 4px 24px rgba(201,168,76,.05)}
.cr{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--border);line-height:1;padding-top:3px}
.card.r1 .cr{color:var(--gold)}
.card.r2 .cr{color:#999}
.card.r3 .cr{color:#8B6914}
.ct{font-family:'Playfair Display',serif;font-size:1.08rem;font-weight:700;color:var(--white);line-height:1.3;margin-bottom:5px}
.cm{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:10px}
.cy{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted)}
.cg{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.07em;text-transform:uppercase;border:1px solid rgba(201,168,76,.3);padding:2px 7px}
.cgl{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.gtag{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);border:1px solid var(--border);padding:2px 6px}
.csb{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.csf{height:100%;background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 100%);border-radius:2px;width:0%;transition:width .8s cubic-bezier(.16,1,.3,1)}
.scl{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);margin-top:4px}
.crat{text-align:right;flex-shrink:0}
.rn{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--white);line-height:1}
.rstar{font-size:.58rem;color:var(--gold);letter-spacing:1px;margin-top:3px}
.rl{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:2px}
footer{border-top:1px solid var(--border);padding:20px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.ft{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.07em}
.ft a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
</style>
</head>

  <div class="logo">Cine<span>Match</span></div>

<main>

      <label>Age &mdash; <span id="av">24</span></label>

    <div class="field">

      </div>
    </div>
    <div class="field">
      <label>Occupation</label>
      <div class="sw">
        <select id="occ">

          <option>educator</option><option selected>engineer</option><option>entertainment</option>
          <option>executive</option><option>healthcare</option><option>homemaker</option>
          <option>lawyer</option><option>librarian</option><option>marketing</option>
          <option>none</option><option>other</option><option>programmer</option>
          <option>retired</option><option>salesman</option><option>scientist</option>
          <option>student</option><option>technician</option><option>writer</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Favourite Genres <span style="color:var(--muted)">(pick up to 4)</span></label>
      <div class="ggrid" id="ggrid"></div>
    </div>
    <button class="cta" onclick="run()">&#10022; Find My Movies</button>
    <div class="dstats">
      <div class="section-label" style="margin-bottom:10px">Dataset</div>
      <div class="ds"><span class="dsv" id="sr">—</span><span class="dsl">Ratings</span></div>
      <div class="ds"><span class="dsv" id="su">—</span><span class="dsl">Users</span></div>
      <div class="ds"><span class="dsv" id="sm">—</span><span class="dsl">Movies</span></div>
    </div>
  </aside>
  <section class="rp" id="rp">
    <div class="empty" id="emp">
      <div class="ei">&#127916;</div>
      <div class="et">Fill in your profile<br>and click <em>&ldquo;Find My Movies&rdquo;</em></div>
    </div>
    <div class="loader" id="ldr"><div class="spin"></div><div class="lt">Analysing your taste&hellip;</div></div>
    <div id="rc" style="display:none">
      <div class="rh" id="rh"><div class="rt" id="rtit">Top Picks</div><div class="rs" id="rsub"></div></div>
      <div class="sbar" id="sbar"></div>
      <div class="cards" id="cc"></div>
    </div>
  </section>
</main>
<footer>
  <span class="ft">Built by <strong style="color:var(--gold)">Vinh</strong> &nbsp;&middot;&nbsp; Pre-PhD Data Science Portfolio</span>
  <span class="ft">Dataset: <a href="https://grouplens.org/datasets/movielens/100k/" target="_blank">MovieLens 100K</a> &middot; GroupLens Research</span>
</footer>

const GENRES=['Action','Adventure','Animation','Childrens','Comedy','Crime','Documentary','Drama','Fantasy','Film-Noir','Horror','Musical','Mystery','Romance','Sci-Fi','Thriller','War','Western'];
let selGender='M', selGenres=new Set();

document.addEventListener('DOMContentLoaded',()=>{
  buildGenres();
  const tot=Object.values(DB.user_ratings).reduce((s,r)=>s+Object.keys(r).length,0);
  document.getElementById('sr').textContent=tot.toLocaleString();
  document.getElementById('su').textContent=DB.users.length.toLocaleString();
  document.getElementById('sm').textContent=DB.movies.length.toLocaleString();
});

function updAge(v){document.getElementById('av').textContent=v;document.getElementById('abig').textContent=v}
function selG(btn){document.querySelectorAll('.gbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selGender=btn.dataset.g}
function buildGenres(){
  const g=document.getElementById('ggrid');
  GENRES.forEach(x=>{const c=document.createElement('div');c.className='gchip';c.textContent=x;c.onclick=()=>togG(x,c);g.appendChild(c)});
}
function togG(g,el){
  if(selGenres.has(g)){selGenres.delete(g);el.classList.remove('sel')}
  else if(selGenres.size<4){selGenres.add(g);el.classList.add('sel')}
}

function findPeers(age,gender,occ){
  let ids=DB.users.filter(u=>gender==='any'||u.gender===gender);
  if(occ!=='any'){const m=ids.filter(u=>u.occ===occ);if(m.length>=20)ids=m}
  for(const w of [10,20,30,100]){
    const a=ids.filter(u=>Math.abs(u.age-age)<=w);
    if(a.length>=20){ids=a;break}
  }
  return new Set(ids.map(u=>String(u.id)));
}

function scoreMovies(peers,liked){
  const pa={};
  peers.forEach(uid=>{
    const ur=DB.user_ratings[uid]||{};
    Object.entries(ur).forEach(([mid,r])=>{
      if(!pa[mid])pa[mid]={s:0,c:0};pa[mid].s+=r;pa[mid].c+=1;
    });
  });
  const gAvg=Object.values(DB.rat_agg).reduce((s,r)=>s+r.avg,0)/DB.movies.length;
  const maxC=Math.max(...Object.values(pa).map(x=>x.c),1);
  return DB.movies.map(m=>{
    const p=pa[String(m.id)];
    const pAvg=p?p.s/p.c:gAvg;
    const pCnt=p?p.c:0;
    let gs=liked.length>0?liked.filter(g=>m.genres.includes(g)).length/liked.length:0.5;
    const gc=(DB.rat_agg[String(m.id)]||{count:0}).count;
    const pop=Math.log1p(gc)/Math.log1p(maxC);
    const score=.55*(pAvg/5)+.30*gs+.15*pop;
    return{...m,pAvg:Math.round(pAvg*100)/100,pCnt,gs:Math.round(gs*100)/100,score:Math.round(score*1000)/1000};
  });
}

function run(){
  const age=parseInt(document.getElementById('aslider').value);
  const occ=document.getElementById('occ').value;
  const liked=[...selGenres];
  document.getElementById('emp').style.display='none';
  document.getElementById('rc').style.display='none';
  document.getElementById('ldr').classList.add('on');
  setTimeout(()=>{
    const peers=findPeers(age,selGender,occ);
    const scored=scoreMovies(peers,liked);
    scored.sort((a,b)=>b.score-a.score);
    const recs=scored.slice(0,5);
    document.getElementById('ldr').classList.remove('on');
    document.getElementById('rc').style.display='block';
    const gl=selGender==='any'?'':selGender==='M'?'male ':'female ';
    document.getElementById('rtit').textContent='Top 5 Picks For You';
    document.getElementById('rsub').textContent=`Based on ${peers.size.toLocaleString()} similar ${gl}${occ==='any'?'':occ+' '}users · Age ~${age}`;
    const avgR=(recs.reduce((s,r)=>s+r.pAvg,0)/recs.length).toFixed(2);
    document.getElementById('sbar').innerHTML=`
      <div><span class="sv">${peers.size.toLocaleString()}</span><br><span class="sl">Peer Users</span></div>
      <div><span class="sv">${liked.length||'All'}</span><br><span class="sl">Genre Prefs</span></div>
      <div><span class="sv">${avgR}★</span><br><span class="sl">Avg Peer Rating</span></div>
      <div><span class="sv">${recs[0]?.title?.match(/\d{4}/)?.[0]||'—'}</span><br><span class="sl">Top Pick Year</span></div>`;
    const cc=document.getElementById('cc');cc.innerHTML='';
    recs.forEach((m,i)=>cc.appendChild(mkCard(m,i+1)));
    document.getElementById('rh').classList.add('vis');
    document.querySelectorAll('.card').forEach((c,i)=>setTimeout(()=>c.classList.add('vis'),i*100+50));
    setTimeout(()=>document.querySelectorAll('.csf').forEach(b=>b.style.width=b.dataset.p+'%'),200);
  },600);
}

function mkCard(m,rank){
  const pct=Math.round(m.score*100);
  const full=Math.round(m.pAvg);
  const stars='★'.repeat(full)+'☆'.repeat(5-full);
  const tags=m.genres.slice(0,4).map(g=>`<span class="gtag">${g}</span>`).join('');
  const d=document.createElement('div');
  d.className=`card r${rank}`;
  d.innerHTML=`
    <div class="cr">${rank<10?'0'+rank:rank}</div>
    <div>
      <div class="ct">${m.title}</div>
      <div class="cm"><span class="cy">${m.year||'—'}</span><span class="cg">${m.primary_genre}</span></div>
      <div class="cgl">${tags}</div>
      <div class="csb"><div class="csf" data-p="${pct}" style="width:0%"></div></div>
      <div class="scl">Match score: ${m.score.toFixed(3)} &nbsp;·&nbsp; ${m.pCnt} peer ratings</div>
    </div>
    <div class="crat">
      <div class="rn">${m.pAvg.toFixed(1)}</div>
      <div class="rstar">${stars}</div>
      <div class="rl">avg rating</div>
    </div>`;
  return d;
}
</script>
